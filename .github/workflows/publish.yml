name: 'publish'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.5.2

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Release Notes
        shell: bash
        run: |
          if [ ! -f ./RELEASE_NOTES.md ]; then
            echo "Release auto-generada y firmada criptográficamente por el pipeline de GitHub Actions." > ./RELEASE_NOTES.md
          fi

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Rename Installer and Signature (Remove _en-US)
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/msi/
          for f in *en-US*; do
            mv "$f" "${f//_en-US/}"
          done

      - name: Create Release and Upload Assets
        shell: bash
        run: |
          gh release create "${{ github.ref_name }}" \
            src-tauri/target/release/bundle/msi/Comparetica_*_x64.msi \
            src-tauri/target/release/bundle/msi/Comparetica_*_x64.msi.sig \
            --title "Comparetica ${{ github.ref_name }}" \
            --notes-file ./RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update updates/latest.json
        run: node scripts/update-latest-json.js

      - name: Commit and Push updates/latest.json
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull origin main
          git add updates/latest.json
          git commit -m "Update updates/latest.json metadata for ${{ github.ref_name }} release [skip ci]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

