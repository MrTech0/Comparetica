name: 'publish'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.5.2

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read Release Notes
        id: read_notes
        shell: bash
        run: |
          if [ -f ./RELEASE_NOTES.md ]; then
            echo "BODY<<EOF" >> $GITHUB_OUTPUT
            cat ./RELEASE_NOTES.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "BODY=Release auto-generada y firmada criptográficamente por el pipeline de GitHub Actions." >> $GITHUB_OUTPUT
          fi

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          includeRelease: false

      - name: Rename Installer and Signature (Remove _en-US)
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/msi/
          for f in *en-US*; do
            mv "$f" "${f//_en-US/}"
          done

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Comparetica ${{ github.ref_name }}
          body: ${{ steps.read_notes.outputs.BODY }}
          draft: false
          prerelease: false
          files: |
            src-tauri/target/release/bundle/msi/Comparetica_*_x64.msi
            src-tauri/target/release/bundle/msi/Comparetica_*_x64.msi.sig

